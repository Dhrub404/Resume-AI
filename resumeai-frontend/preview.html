<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; overflow: hidden; display: flex; height: 100vh; }
  .sidebar { width: 260px; background: #1e293b; padding: 2rem 1rem; }
  .nav-item { padding: 1rem; margin-bottom: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer; transition: 0.2s; }
  .nav-item:hover { background: rgba(255,255,255,0.1); }
  .content { flex: 1; padding: 2rem; }
  
  .expanding-circle {
    position: fixed;
    border-radius: 50%;
    background: #0f172a; /* Matches the target page bg */
    transform: translate(-50%, -50%) scale(0);
    z-index: 9999;
    pointer-events: none;
    transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
  }
  
  .expanding-circle.active {
    transform: translate(-50%, -50%) scale(1);
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="nav-item" onclick="triggerAnimation(event)">🎯 Dashboard</div>
  <div class="nav-item" onclick="triggerAnimation(event)">📝 Resume Builder</div>
</div>
<div class="content">
  <h1>Current Page</h1>
  <p>Click a sidebar link to see the transition.</p>
</div>

<!-- This will be our animated circle -->
<div id="circle" class="expanding-circle" style="width: 3000px; height: 3000px;"></div>

<script>
  function triggerAnimation(e) {
    const circle = document.getElementById('circle');
    // Set circle origin to click coordinates
    circle.style.left = e.clientX + 'px';
    circle.style.top = e.clientY + 'px';
    
    // Animate
    setTimeout(() => {
      circle.classList.add('active');
    }, 10);
    
    // Reset after demo
    setTimeout(() => {
      circle.classList.remove('active');
      circle.style.transition = 'none';
      setTimeout(() => circle.style.transition = '', 50);
    }, 1500);
  }
</script>
</body>
</html>
